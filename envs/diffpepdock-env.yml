name: diffpepdock
# DiffPepDock (YuzheWangPKU/DiffPepBuilder) environment
# Adapted from upstream environment.yml to use CUDA 13.x / cu130 wheels
# for RTX 5070 (Blackwell CC 12.0) compatibility.
# PyRosetta is NOT included — we skip rosetta_relax postprocessing.
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - numpy=1.26
  - scipy=1.11
  - pandas=2.1
  - scikit-learn=1.3
  - matplotlib=3.7
  - biopython=1.81
  - tqdm
  - pip:
    - torch==2.7.0 --index-url https://download.pytorch.org/whl/cu128
    - torchvision==0.22.0 --index-url https://download.pytorch.org/whl/cu128
    - torchaudio==2.7.0 --index-url https://download.pytorch.org/whl/cu128
    - fair-esm==2.0.0
    - biotite==0.38.0
    - mdtraj==1.9.9
    - dm-tree==0.1.8
    - easydict==1.11
    - hydra-core==1.3.2
    - hydra-joblib-launcher==1.2.0
    - omegaconf==2.3.0
    - ml-collections==0.1.1
    - pyrootutils==1.0.4
    - python-dotenv==1.0.0
    - gputil==1.4.0
    - wandb==0.15.12
    - tmtools
    - py3Dmol
    - openmm==8.0
    - pdbfixer
    - gitpython==3.1.40
    - protobuf==4.24.4
