name: rapidock
channels:
  - pytorch
  - nvidia
  - pyg
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - conda-forge::numpy>=1.26
  - conda-forge::scipy>=1.13
  - conda-forge::scikit-learn>=1.4
  - conda-forge::biopython>=1.83
  - conda-forge::networkx>=3.0
  - conda-forge::pandas>=2.0
  - conda-forge::tqdm>=4.60
  - conda-forge::rdkit>=2024.03
  - conda-forge::mdanalysis>=2.7
  - conda-forge::e3nn>=0.5
  - pip:
      # PyTorch 2.7 + CUDA 12.8 — required for Blackwell (CC 12.0, RTX 5070).
      # Install separately after env creation (see INSTALL.md Step 2):
      #   pip install torch==2.7.0 --index-url https://download.pytorch.org/whl/cu128
      #   pip install torch-scatter torch-sparse torch-cluster torch-spline-conv \
      #               -f https://data.pyg.org/whl/torch-2.7.0+cu128.html
      - "fair-esm>=2.0"
      # RAPiDock: bundled as a git submodule at third_party/RAPiDock/ (see INSTALL.md Step 3).
      # No pip install needed — the runner imports directly from that directory.
