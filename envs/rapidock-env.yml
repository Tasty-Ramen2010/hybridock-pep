name: rapidock
# RAPiDock-Reloaded (Tasty-Ramen2010/RAPiDock-Reloaded) environment.
# Now cross-platform: CUDA (Linux/Windows), MPS (macOS Apple Silicon), and CPU.
#
# For CUDA (RTX 5070, Blackwell CC 12.0) — install PyTorch after env creation:
#   pip install torch==2.7.0 --index-url https://download.pytorch.org/whl/cu128
#   pip install torch-scatter torch-sparse torch-cluster torch-spline-conv \
#               -f https://data.pyg.org/whl/torch-2.7.0+cu128.html
#
# For macOS (MPS, Apple Silicon):
#   pip install torch torchvision torchaudio
#   pip install torch-scatter torch-sparse torch-cluster torch_geometric
#   (MPS fallback is enabled automatically by inference.py — no env vars needed)
#
# RAPiDock-Reloaded auto-detects the device at runtime (CUDA → MPS → CPU).
channels:
  - pytorch
  - nvidia
  - pyg
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - conda-forge::numpy>=1.26
  - conda-forge::scipy>=1.13
  - conda-forge::scikit-learn>=1.4
  - conda-forge::biopython>=1.83
  - conda-forge::networkx>=3.0
  - conda-forge::pandas>=2.0
  - conda-forge::tqdm>=4.60
  - conda-forge::rdkit>=2024.03
  - conda-forge::mdanalysis>=2.7
  - conda-forge::e3nn>=0.5
  - conda-forge::psutil
  - pip:
      - "fair-esm>=2.0"
      - "opt-einsum"
      - "PeptideBuilder"
      - "sympy"
      # PyTorch + PyG: see platform-specific instructions above.
      # RAPiDock-Reloaded: bundled as a git submodule at third_party/RAPiDock/ (see INSTALL.md).
      # No pip install needed — run_rapidock.py imports directly from that directory.
