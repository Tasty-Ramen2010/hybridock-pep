name: rapidock
# RAPiDock-Reloaded (Tasty-Ramen2010/RAPiDock-Reloaded) environment — CUDA / Linux+WSL2.
# For macOS Apple Silicon (MPS) use envs/rapidock-env-macos.yml instead.
#
# After creating the env, install PyTorch + PyG via pip:
#
#   CUDA 12.8 (RTX 5070 / Blackwell CC 12.0, Linux):
#     conda run -n rapidock pip install torch==2.7.0 \
#         --index-url https://download.pytorch.org/whl/cu128
#     conda run -n rapidock pip install \
#         torch-scatter torch-sparse torch-cluster torch-spline-conv \
#         -f https://data.pyg.org/whl/torch-2.7.0+cu128.html
#
# RAPiDock-Reloaded auto-detects CUDA → MPS → CPU at runtime.
# Bundled at third_party/RAPiDock/ — no pip install needed.
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - conda-forge::numpy>=1.26
  - conda-forge::scipy>=1.13
  - conda-forge::scikit-learn>=1.4
  - conda-forge::biopython>=1.83
  - conda-forge::networkx>=3.0
  - conda-forge::pandas>=2.0
  - conda-forge::tqdm>=4.60
  - conda-forge::rdkit>=2024.03
  - conda-forge::mdanalysis>=2.7
  - conda-forge::e3nn>=0.5
  - conda-forge::psutil
  - pip:
      - "fair-esm>=2.0"
      - "opt-einsum"
      - "PeptideBuilder"
      - "sympy"
      # PyTorch + PyG: install via pip AFTER env creation (see header above).
      # RAPiDock-Reloaded: bundled at third_party/RAPiDock/ — import directly.
